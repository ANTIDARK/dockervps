version: '3.8'

services:
  alpine-toolbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alpine-toolbox
    restart: unless-stopped
    # 只暴露 1 个端口给外部
    ports:
      - "8080:80"      # 映射到宿主机 8080（可修改为你平台分配的端口）
    volumes:
      # 持久化数据目录
      - ./data:/srv/dufs
    environment:
      # 自定义系统用户（TTYD 登录用）
      - USER_NAME=admin
      - USER_PASS=admin123
      # dufs 文件管理登录用户
      - DUFS_USER=admin
      - DUFS_PASS=admin123
    # 资源限制（适配 1核/250MB/1GB 环境）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 200M
